name: Release

# 打 tag(v*)即触发完整分发流水线:
#   备模型 → 编 CP DLL + 便携包(build_release) → Inno 打成 setup.exe → 传到 GitHub Release。
# 也可手动 workflow_dispatch(只产出 setup.exe 作为 artifact,不建 Release,便于试打)。
#
# 与 ci.yml 的分工:ci 是每次 push 的"能不能构建"守门;release 是"打出可安装的成品"。
# 真机功能(摄像头 / 锁屏 / SYSTEM 解锁)CI 无法验证,不在本流水线覆盖——只保证包能打出来。

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号(如 1.0.0);留空则取 tag,再留空用 0.0.0-dev'
        required: false

permissions:
  contents: write          # 建 Release / 上传资产需要写权限

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    env:
      # runner 默认 cp1252,脚本里 print 中文会 UnicodeEncodeError;开 UTF-8 模式
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Cache models
        uses: actions/cache@v4
        with:
          path: models                  # 与 ci.yml 共享同一缓存(换模型时一起 bump v1)
          key: models-${{ runner.os }}-v2
          restore-keys: |
            models-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync

      - name: Prepare models (download buffalo_l + face_landmarker into models/)
        env:
          PYTHONPATH: ${{ github.workspace }}   # package=false,要把仓库根加进 sys.path
        run: uv run python scripts/offline_check.py   # 触发模型下载,同时充当离线自检守门

      - name: Prune unused buffalo_l models (match local lean package)
        shell: pwsh
        run: |
          # 与本机一致:只留 det_10g + w600k_r50,删掉用不到的 onnx(识别精度无损,缩小包体)
          $bl = "models/buffalo_l"
          foreach ($f in '1k3d68.onnx','2d106det.onnx','genderage.onnx') {
            $p = Join-Path $bl $f
            if (Test-Path $p) { Remove-Item $p -Force; Write-Host "pruned $f" }
          }
          # insightface 解压后残留的原始包(~281MB),删掉避免 models 缓存膨胀
          if (Test-Path "models/buffalo_l.zip") { Remove-Item "models/buffalo_l.zip" -Force; Write-Host "pruned buffalo_l.zip" }

      - name: Quantize recognition model to FP16 (shrink cold-boot read 174MB->~87MB)
        env:
          PYTHONPATH: ${{ github.workspace }}   # 与 offline_check 同:把仓库根加进 sys.path
        # onnxconverter-common 仅转换时需要,用 --with 临时装,不进运行时/分发依赖。
        # 脚本幂等:已是 fp16 则跳过(缓存复跑安全)。
        run: uv run --with onnxconverter-common python scripts/quantize_model.py

      - name: Verify quantized models
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: uv run python scripts/offline_check.py

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2          # 让 build_release 内部能调到 msbuild 编 DLL

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $inp = "${{ github.event.inputs.version }}"
          $ref = "${{ github.ref_name }}"
          if ($inp) { $v = $inp }
          elseif ($ref -match '^v((0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*))$') { $v = $Matches[1] }
          else { throw "release version must be canonical MAJOR.MINOR.PATCH" }
          if ($v -notmatch '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$') {
            throw "invalid release version: $v"
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "resolved version=$v"

      - name: Prepare production signing certificate
        if: startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 2
        shell: pwsh
        env:
          SIGN_PFX_BASE64: ${{ secrets.FACEHELLO_SIGN_PFX_BASE64 }}
          SIGN_PFX_PASSWORD: ${{ secrets.FACEHELLO_SIGN_PASS }}
        run: |
          $ErrorActionPreference = "Stop"
          if (-not $env:SIGN_PFX_BASE64) {
            throw "tagged releases require FACEHELLO_SIGN_PFX_BASE64"
          }
          Write-Host "Decoding signing certificate"
          $pfx = Join-Path $env:RUNNER_TEMP "facehello-signing.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGN_PFX_BASE64))
          Write-Host "Loading signing certificate with an ephemeral private key"
          $keyFlags = [Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
          $cert = [Security.Cryptography.X509Certificates.X509Certificate2]::new(
            $pfx,
            $env:SIGN_PFX_PASSWORD,
            $keyFlags
          )
          if (-not $cert.HasPrivateKey) {
            throw "signing PFX does not contain a private key"
          }
          Write-Host "Computing signer certificate pin"
          $sha = [Security.Cryptography.SHA256]::Create()
          try {
            $signerSha256 = ([BitConverter]::ToString($sha.ComputeHash($cert.RawData))).Replace('-', '').ToLowerInvariant()
          } finally {
            $sha.Dispose()
          }
          "FACEHELLO_SIGN_PFX=$pfx" >> $env:GITHUB_ENV
          "FACEHELLO_SIGN_PASS=$env:SIGN_PFX_PASSWORD" >> $env:GITHUB_ENV
          "FACEHELLO_SIGNER_SHA256=$signerSha256" >> $env:GITHUB_ENV
          Write-Host "Exporting public signer certificate"
          $certPath = Join-Path $env:RUNNER_TEMP "FaceHello-Signer.cer"
          $publicBytes = $cert.Export([Security.Cryptography.X509Certificates.X509ContentType]::Cert)
          [IO.File]::WriteAllBytes($certPath, $publicBytes)
          foreach ($storeName in "Root", "TrustedPublisher") {
            Write-Host "Adding public certificate to CurrentUser/$storeName"
            & certutil.exe -user -addstore -f -silent $storeName $certPath
            if ($LASTEXITCODE -ne 0) {
              throw "certutil failed to add the certificate to CurrentUser/$storeName"
            }
          }
          Write-Host "Signing certificate preparation complete"

      - name: Build portable package (DLL + python + deps + models + payload)
        env:
          FACEHELLO_VERSION: ${{ steps.ver.outputs.version }}
          FACEHELLO_COMMIT: ${{ github.sha }}
        run: uv run python scripts/build_release.py

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $build = "$env:LOCALAPPDATA\FaceHello-build\FaceHello"
          $args = @("/DMyAppVersion=${{ steps.ver.outputs.version }}", "/DBuildDir=$build")
          if ($env:FACEHELLO_SIGN_PFX) {
            $sign = "signtool sign /fd SHA256 /f `"$env:FACEHELLO_SIGN_PFX`" /p `"$env:FACEHELLO_SIGN_PASS`" /tr http://timestamp.digicert.com /td SHA256 `$f"
            $args += "/DSign"
            $args += "/Sfacehello=$sign"
          }
          $args += "installer/FaceHello.iss"
          & $iscc @args
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit $LASTEXITCODE" }

      - name: Verify production signatures
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          signtool verify /pa /v "$env:LOCALAPPDATA\FaceHello-build\FaceHello\FaceHelloCP-${{ steps.ver.outputs.version }}.dll"
          if ($LASTEXITCODE -ne 0) { throw "CP signature verification failed" }
          signtool verify /pa /v "installer\Output\FaceHello-Setup-${{ steps.ver.outputs.version }}.exe"
          if ($LASTEXITCODE -ne 0) { throw "installer signature verification failed" }

      - name: Generate updater metadata
        shell: pwsh
        run: |
          $installer = Get-ChildItem "installer/Output/FaceHello-Setup-${{ steps.ver.outputs.version }}.exe" | Select-Object -First 1
          if (-not $installer) { throw "installer not found" }
          uv run python scripts/generate_update_manifest.py $installer.FullName --version "${{ steps.ver.outputs.version }}" --commit "${{ github.sha }}" --output "installer/Output"

      - name: Validate updater metadata
        shell: pwsh
        run: |
          uv run --group test pytest tests/test_version.py tests/test_update_manifest.py -q
          $manifest = Get-Content "installer/Output/facehello-update.json" -Raw | ConvertFrom-Json
          if ($manifest.version -ne "${{ steps.ver.outputs.version }}") { throw "manifest version mismatch" }

      - name: Upload release artifact set
        uses: actions/upload-artifact@v4
        with:
          name: FaceHello-Setup-${{ steps.ver.outputs.version }}
          path: |
            installer/Output/FaceHello-Setup-*.exe
            installer/Output/FaceHello-Setup-*.exe.sha256
            installer/Output/facehello-update.json
          if-no-files-found: error

      - name: Publish draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/FaceHello-Setup-*.exe
            installer/Output/FaceHello-Setup-*.exe.sha256
            installer/Output/facehello-update.json
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: true

      - name: Re-download and verify draft assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $verify = Join-Path $env:RUNNER_TEMP "facehello-release-verify"
          New-Item -ItemType Directory -Path $verify -Force | Out-Null
          gh release download "${{ github.ref_name }}" --dir $verify --pattern "FaceHello-Setup-${{ steps.ver.outputs.version }}.exe" --pattern "FaceHello-Setup-${{ steps.ver.outputs.version }}.exe.sha256" --pattern "facehello-update.json"
          $installer = Join-Path $verify "FaceHello-Setup-${{ steps.ver.outputs.version }}.exe"
          $manifest = Get-Content (Join-Path $verify "facehello-update.json") -Raw | ConvertFrom-Json
          $checksumLine = (Get-Content (Join-Path $verify "FaceHello-Setup-${{ steps.ver.outputs.version }}.exe.sha256") -Raw).Trim()
          $actualHash = (Get-FileHash $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          $actualSize = (Get-Item $installer).Length
          if ($manifest.version -ne "${{ steps.ver.outputs.version }}") { throw "draft manifest version mismatch" }
          if ($manifest.installer.name -ne (Split-Path $installer -Leaf)) { throw "draft installer name mismatch" }
          if ([int64]$manifest.installer.size -ne $actualSize) { throw "draft installer size mismatch" }
          if ($manifest.installer.sha256 -ne $actualHash) { throw "draft manifest hash mismatch" }
          if (-not $checksumLine.StartsWith("$actualHash  ")) { throw "draft checksum mismatch" }
          signtool verify /pa /v $installer
          if ($LASTEXITCODE -ne 0) { throw "downloaded installer signature verification failed" }
